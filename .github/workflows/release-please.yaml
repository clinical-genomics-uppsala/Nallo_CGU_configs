on:
  push:
    branches:
      - main

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        manifest-file: .release-please-manifest.json
        with:
          release-type: simple
          package-name: nallo_cgu_configs
          default-branch: main
